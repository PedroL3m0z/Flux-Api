services:
  flux:
    # The Flux Docker image bundles the API, PostgreSQL and Redis in one
    # container. Just mount a volume at /data to persist the database and the
    # auto-generated secrets across restarts.
    image: pedrooaj/flux-api:latest
    container_name: flux
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # The dashboard is same-origin; set your real frontend origin(s) here.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Optional: seed an initial user on first boot (set these in .env).
      SEED_EMAIL: ${SEED_EMAIL:-}
      SEED_USERNAME: ${SEED_USERNAME:-}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
    volumes:
      - flux_data:/data

volumes:
  flux_data:
