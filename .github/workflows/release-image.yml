name: release-image

# Builds the all-in-one image and publishes it to Docker Hub on every GitHub
# Release (created by release-please). Manual runs are allowed via the Actions
# tab for re-publishing a tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 1.3.0). Defaults to latest only.'
        required: false
      platforms:
        description: 'Target platforms. Use linux/amd64 for a fast test build.'
        required: false
        default: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write # push to GHCR with the automatic GITHUB_TOKEN

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the GHCR owner automatically.
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flux-api
            ghcr.io/${{ github.repository_owner }}/flux-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push (all-in-one, multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: allinone
          # Release events build multi-arch; manual runs can override (e.g.
          # linux/amd64 only) for a fast test build.
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
