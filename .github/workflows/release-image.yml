name: release-image

# Builds the Flux Docker image (API + PostgreSQL + Redis in one container) and
# publishes it to Docker Hub and GHCR on every GitHub Release. Single-arch
# (linux/amd64) with build attestations disabled, so each tag is a single image
# manifest — no extra digest-only (untagged) versions show up in the registries.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to publish (e.g. ci-test). Optional.'
        required: false

permissions:
  contents: read
  packages: write # push to GHCR with the automatic GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lowercase GHCR owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flux-api
            ghcr.io/${{ env.OWNER_LC }}/flux-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          # No provenance/SBOM attestations: keeps each tag a single manifest so
          # the registries don't accumulate untagged digest-only versions.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published images" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
