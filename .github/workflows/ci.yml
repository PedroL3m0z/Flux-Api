name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: flux
          POSTGRES_PASSWORD: flux
          POSTGRES_DB: flux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flux -d flux"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://flux:flux@localhost:5432/flux?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-secret-ci-secret-0123456789
      API_KEY: ci-api-key

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma:generate

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Sync database schema
        run: yarn prisma db push --schema=src/core/prisma/schema.prisma

      - name: Unit tests
        run: yarn test

      - name: E2E tests
        run: yarn test:e2e
